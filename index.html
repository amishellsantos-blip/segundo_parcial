<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercaRed - Inventario</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Merca<span>Red</span></h1>
                <p>Gestión de Inventario Logístico</p>
            </div>
            <div class="stats-card">
                <h3>Total Inventario</h3>
                <h2 id="totalInventarioValor">$0</h2>
            </div>
        </header>

        <main>
            <section class="form-section glass">
                <h2>Registrar Nuevo Producto</h2>
                <form id="productForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="codigoProducto">Código de Producto</label>
                            <input type="text" id="codigoProducto" required placeholder="Ej: PRD-001">
                        </div>
                        <div class="form-group">
                            <label for="nombreProducto">Nombre de Producto</label>
                            <input type="text" id="nombreProducto" required placeholder="Ej: Leche Entera">
                        </div>
                        <div class="form-group">
                            <label for="proveedor">Proveedor</label>
                            <input type="text" id="proveedor" required placeholder="Nombre del proveedor">
                        </div>
                        <div class="form-group">
                            <label for="stock">Stock</label>
                            <input type="number" id="stock" required min="1" placeholder="Cantidad disponible">
                        </div>
                        <div class="form-group">
                            <label for="precioUnitario">Precio Unitario ($)</label>
                            <input type="number" id="precioUnitario" required min="1" placeholder="Valor sin descuento">
                        </div>
                        <div class="form-group">
                            <label for="categoriaProducto">Categoría</label>
                            <select id="categoriaProducto" required>
                                <option value="" disabled selected>Seleccione una categoría</option>
                                <option value="A">Alimentos</option>
                                <option value="L">Aseo/Limpieza</option>
                                <option value="T">Tecnología</option>
                                <option value="R">Ropa</option>
                            </select>
                        </div>
                    </div>

                    <div id="dynamicFields" class="form-group dynamic-container" style="display: none;">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Registrar Producto</button>
                    </div>
                </form>
            </section>

            <section class="table-section glass">
                <div class="table-header">
                    <h2>Inventario Actual</h2>
                    <button id="clearInventoryBtn" class="btn btn-danger btn-sm">Limpiar Inventario</button>
                </div>
                <div class="table-responsive">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Proveedor</th>
                                <th>Categoría</th>
                                <th>Stock</th>
                                <th>Precio Uni.</th>
                                <th>Descuento</th>
                                <th>Precio Final</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="model/Producto.js"></script>
    <script src="model/Alimento.js"></script>
    <script src="model/Tecnologia.js"></script>
    <script src="controller/app.js"></script>
</body>

</html>
